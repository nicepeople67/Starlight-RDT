<!DOCTYPE html>
<html>
<head>
  <title>DeltaRDT</title>
</head>
<body>

<h2>DeltaRDT Remote</h2>

<button id="startBtn">Start Sharing</button>

<br><br>

<input id="roomInput" placeholder="Enter Room ID">
<button id="joinBtn">Join</button>

<br><br>

<video id="remoteVideo" autoplay playsinline style="width:80%; border:1px solid black;"></video>

<script type="module">
  // 🔥 FIREBASE IMPORTS
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getFirestore,
    doc,
    setDoc,
    getDoc,
    updateDoc,
    onSnapshot,
    collection,
    addDoc
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // 🔧 REPLACE THIS WITH YOUR CONFIG
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "deltardt.firebaseapp.com",
    projectId: "deltardt",
    storageBucket: "deltardt.appspot.com",
    messagingSenderId: "YOUR_ID",
    appId: "YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let pc;
  let roomRef;

  const servers = {
    iceServers: [
      { urls: "stun:stun.l.google.com:19302" }
    ]
  };

  const remoteVideo = document.getElementById("remoteVideo");

  // 🚀 HOST
  async function startHost() {
    pc = new RTCPeerConnection(servers);

    const stream = await navigator.mediaDevices.getDisplayMedia();
    stream.getTracks().forEach(track => pc.addTrack(track, stream));

    roomRef = doc(collection(db, "rooms"));

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    await setDoc(roomRef, {
      offer: {
        type: offer.type,
        sdp: offer.sdp
      }
    });

    pc.onicecandidate = (event) => {
      if (event.candidate) {
        addDoc(collection(roomRef, "candidates"), event.candidate.toJSON());
      }
    };

    onSnapshot(roomRef, async (snapshot) => {
      const data = snapshot.data();
      if (data?.answer && !pc.currentRemoteDescription) {
        await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
      }
    });

    alert("Room ID: " + roomRef.id);
  }

  // 👀 VIEWER
  async function joinRoom() {
    const roomId = document.getElementById("roomInput").value;

    if (!roomId) {
      alert("Enter Room ID");
      return;
    }

    roomRef = doc(db, "rooms", roomId);
    const roomSnap = await getDoc(roomRef);

    if (!roomSnap.exists()) {
      alert("Room not found");
      return;
    }

    const roomData = roomSnap.data();

    pc = new RTCPeerConnection(servers);

    pc.ontrack = (event) => {
      remoteVideo.srcObject = event.streams[0];
    };

    await pc.setRemoteDescription(new RTCSessionDescription(roomData.offer));

    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);

    await updateDoc(roomRef, {
      answer: {
        type: answer.type,
        sdp: answer.sdp
      }
    });

    pc.onicecandidate = (event) => {
      if (event.candidate) {
        addDoc(collection(roomRef, "candidates"), event.candidate.toJSON());
      }
    };

    onSnapshot(collection(roomRef, "candidates"), (snapshot) => {
      snapshot.docChanges().forEach((change) => {
        if (change.type === "added") {
          pc.addIceCandidate(new RTCIceCandidate(change.doc.data()));
        }
      });
    });
  }

  // 🔥 BUTTON FIX (IMPORTANT)
  document.getElementById("startBtn").onclick = startHost;
  document.getElementById("joinBtn").onclick = joinRoom;

</script>

</body>
</html>
