<!DOCTYPE html>
<html>
<head>
  <title>DeltaRDT</title>
</head>
<body>

<h2>DeltaRDT Remote</h2>

<button id="startBtn">Start Sharing</button>

<br><br>

<input id="roomInput" placeholder="Enter Room ID">
<button id="joinBtn">Join</button>

<br><br>

<video id="remoteVideo" autoplay playsinline style="width:80%; border:1px solid black;"></video>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  doc,
  setDoc,
  getDoc,
  updateDoc,
  onSnapshot,
  collection,
  addDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔧 PUT YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let pc;
let roomRef;

const servers = {
  iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
};

const video = document.getElementById("remoteVideo");

// ---------------- HOST ----------------
async function startHost() {
  try {
    pc = new RTCPeerConnection(servers);

    const stream = await navigator.mediaDevices.getDisplayMedia();
    stream.getTracks().forEach(track => pc.addTrack(track, stream));

    roomRef = doc(collection(db, "rooms"));

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    await setDoc(roomRef, {
      offer: { type: offer.type, sdp: offer.sdp }
    });

    pc.onicecandidate = (event) => {
      if (event.candidate) {
        addDoc(collection(roomRef, "candidates"), event.candidate.toJSON());
      }
    };

    onSnapshot(roomRef, (snap) => {
      const data = snap.data();
      if (data?.answer && !pc.currentRemoteDescription) {
        pc.setRemoteDescription(new RTCSessionDescription(data.answer));
      }
    });

    alert("ROOM ID: " + roomRef.id);

  } catch (e) {
    alert("Error: " + e.message);
    console.error(e);
  }
}

// ---------------- JOIN ----------------
async function joinRoom() {
  const roomId = document.getElementById("roomInput").value;

  roomRef = doc(db, "rooms", roomId);
  const snap = await getDoc(roomRef);

  if (!snap.exists()) {
    alert("Room not found");
    return;
  }

  pc = new RTCPeerConnection(servers);

  pc.ontrack = (event) => {
    video.srcObject = event.streams[0];
  };

  await pc.setRemoteDescription(new RTCSessionDescription(snap.data().offer));

  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);

  await updateDoc(roomRef, {
    answer: { type: answer.type, sdp: answer.sdp }
  });

  pc.onicecandidate = (event) => {
    if (event.candidate) {
      addDoc(collection(roomRef, "candidates"), event.candidate.toJSON());
    }
  };

  onSnapshot(collection(roomRef, "candidates"), (snapshot) => {
    snapshot.docChanges().forEach((change) => {
      if (change.type === "added") {
        pc.addIceCandidate(new RTCIceCandidate(change.doc.data()));
      }
    });
  });
}

// buttons
document.getElementById("startBtn").onclick = startHost;
document.getElementById("joinBtn").onclick = joinRoom;

</script>

</body>
</html>
