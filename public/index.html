<!DOCTYPE html>
<html>
<head>
  <title>DeltaRDT</title>
</head>
<body>

<h2>DeltaRDT Remote</h2>

<button onclick="startHost()">Start Sharing</button>

<br><br>

<input id="roomInput" placeholder="Enter Room ID">
<button onclick="joinRoom()">Join</button>

<br><br>

<video id="remoteVideo" autoplay playsinline style="width:80%; border:1px solid black;"></video>

<script type="module">
  // 🔥 IMPORT FIREBASE
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getFirestore,
    doc,
    setDoc,
    getDoc,
    updateDoc,
    onSnapshot,
    collection,
    addDoc
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // 🔧 YOUR FIREBASE CONFIG
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let pc;
  let roomRef;

  const servers = {
    iceServers: [
      { urls: "stun:stun.l.google.com:19302" }
    ]
  };

  const remoteVideo = document.getElementById("remoteVideo");

  // 🚀 HOST (HOME PC)
  window.startHost = async () => {
    pc = new RTCPeerConnection(servers);

    // Share screen
    const stream = await navigator.mediaDevices.getDisplayMedia();
    stream.getTracks().forEach(track => pc.addTrack(track, stream));

    // Create room
    roomRef = doc(collection(db, "rooms"));
    
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    await setDoc(roomRef, {
      offer: {
        type: offer.type,
        sdp: offer.sdp
      }
    });

    // ICE
    pc.onicecandidate = (event) => {
      if (event.candidate) {
        addDoc(collection(roomRef, "candidates"), event.candidate.toJSON());
      }
    };

    // Listen for answer
    onSnapshot(roomRef, async (snapshot) => {
      const data = snapshot.data();
      if (data?.answer && !pc.currentRemoteDescription) {
        await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
      }
    });

    alert("Room ID: " + roomRef.id);
  };

  // 👀 VIEWER (OFFICE PC)
  window.joinRoom = async () => {
    const roomId = document.getElementById("roomInput").value;
    roomRef = doc(db, "rooms", roomId);

    const roomSnap = await getDoc(roomRef);
    const roomData = roomSnap.data();

    pc = new RTCPeerConnection(servers);

    // Receive stream
    pc.ontrack = (event) => {
      remoteVideo.srcObject = event.streams[0];
    };

    await pc.setRemoteDescription(new RTCSessionDescription(roomData.offer));

    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);

    await updateDoc(roomRef, {
      answer: {
        type: answer.type,
        sdp: answer.sdp
      }
    });

    // ICE
    pc.onicecandidate = (event) => {
      if (event.candidate) {
        addDoc(collection(roomRef, "candidates"), event.candidate.toJSON());
      }
    };

    // Listen for ICE
    onSnapshot(collection(roomRef, "candidates"), (snapshot) => {
      snapshot.docChanges().forEach((change) => {
        if (change.type === "added") {
          pc.addIceCandidate(new RTCIceCandidate(change.doc.data()));
        }
      });
    });
  };
</script>

</body>
</html>
